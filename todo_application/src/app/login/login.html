<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">

      <div class="card shadow border-0 rounded-3">

        <div class="card-header bg-white text-center border-bottom">
          <h3 class="mb-1">Login</h3>
          <small class="text-muted">Sign in to continue</small>
        </div>

        <div class="card-body">

          @if (attempted && invalidCredentials) {
            <div class="alert alert-danger">
              {{ errorMessage }}
            </div>
          }

          <div class="mb-3">
            <label class="form-label fw-semibold">
              Username
            </label>

            <input
              type="text"
              class="form-control"
              placeholder="Enter your username"
              name="username"
              [(ngModel)]="username"
              [ngModelOptions]="{standalone:true}"
              required>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">
              Password
            </label>

            <input
              type="password"
              class="form-control"
              placeholder="Enter your password"
              name="password"
              [(ngModel)]="password"
              [ngModelOptions]="{standalone:true}"
              required>
          </div>

          <div class="d-grid">
            <button
              class="btn btn-dark btn-lg"
              (click)="handleLogin()">
              Login
            </button>
          </div>

        </div>

        <div class="card-footer bg-white text-center text-muted small">
          Welcome to Todo Manager
        </div>

      </div>

    </div>
  </div>
</div>
